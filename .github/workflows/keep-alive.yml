name: keep-alive

# Dá um "oi" no Supabase 2x por semana pra o free tier não pausar por inatividade.
# Grátis (roda no GitHub Actions). Zero custo, zero manutenção.

on:
  schedule:
    - cron: '0 6 * * 1,4' # segunda e quinta, 06:00 UTC
  workflow_dispatch: {} # permite rodar na mão pra testar

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          URL: ${{ secrets.SUPABASE_URL }}
          KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$URL" ] || [ -z "$KEY" ]; then
            echo "::error::Faltam os secrets SUPABASE_URL e/ou SUPABASE_ANON_KEY. Adicione em Settings -> Secrets and variables -> Actions (nomes exatos)."
            exit 1
          fi
          echo "Pingando o Supabase..."
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" \
            "$URL/rest/v1/finance_data?select=id&limit=1" \
            -H "apikey: $KEY" \
            -H "Authorization: Bearer $KEY"
          echo "OK — projeto mantido ativo."
